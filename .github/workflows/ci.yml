name: CI

# Corre compilación y la suite de tests en cada push a main y en cada PR.
# No usa secretos, no toca .env, no hace llamadas reales a APIs externas
# (los tests mockean la red). Solo valida que el código compile y que los
# tests pasen.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Compile + Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all modules
        run: python -m py_compile src/*.py scripts/*.py main.py

      - name: Run test suite
        run: python -m unittest discover -s tests -v
