name: CI/CD

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check --diff .

      - name: Type check (mypy)
        run: mypy src/ --show-error-codes || echo 'mypy: errores pendientes (no bloqueante)'

      - name: Sanity check (estructura)
        run: python -c "import os; assert os.path.isdir('src') and os.path.isfile('run_bot_prod.sh')"

      - name: Run tests
        run: python -m pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=64
