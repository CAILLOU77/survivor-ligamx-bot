name: Temporary Ruff Formatter

on:
  push:
    branches:
      - copilot/corregir-comando-telegram-plan

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: copilot/corregir-comando-telegram-plan

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Ruff
        run: pip install 'ruff>=0.15.0'

      - name: Format and commit
        run: |
          ruff format .
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'style: aplica formato Ruff'
          git push
