name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 16 * * *'

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate production ecosystem
        run: python -m src.production_smoke --attempts 6 --timeout 20 --delay 10
