name: Fix stable match contract formatting

on:
  push:
    branches: [feat/stable-match-contract-consumer]
    paths: [scripts/format_stable_contract.py]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/stable-match-contract-consumer
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install project tooling
        run: pip install -r requirements-dev.txt
      - name: Apply Ruff fixes and format
        run: python scripts/format_stable_contract.py
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ligamx_api.py tests/test_ligamx_contract.py
          git diff --cached --quiet || git commit -m "style: aplica Ruff al contrato estable"
          git push
