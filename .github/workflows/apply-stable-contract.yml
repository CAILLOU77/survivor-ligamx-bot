name: Apply stable match contract

on:
  push:
    branches: [feat/stable-match-contract-consumer]
    paths: [scripts/apply_stable_match_contract_patch.py]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/stable-match-contract-consumer
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply deterministic patch
        run: python scripts/apply_stable_match_contract_patch.py
      - name: Commit generated source and tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ligamx_api.py tests/test_ligamx_contract.py
          git commit -m "feat: consume identidad ESPN y kickoffs UTC"
          git push
