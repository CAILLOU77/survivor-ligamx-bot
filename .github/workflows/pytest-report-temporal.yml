name: Temporary Pytest Report

on:
  push:
    branches:
      - copilot/corregir-comando-telegram-plan

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: copilot/corregir-comando-telegram-plan

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Capture and commit pytest report
        run: |
          python -m pytest tests/test_plan_persistido.py tests/test_telegram_pronosticos.py tests/test_pick_lifecycle_v2.py -q --tb=short > pytest-report.txt 2>&1 || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pytest-report.txt
          git commit -m 'ci: captura reporte pytest' || exit 0
          git push
