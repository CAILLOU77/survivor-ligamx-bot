name: Apply final Telegram v2

on:
  push:
    branches: [feat/idempotent-telegram-delivery]
    paths: [scripts/fix_finalize_telegram_v2.py]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-telegram-delivery
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Apply and validate focused suite
        run: |
          python scripts/fix_finalize_telegram_v2.py
          python scripts/finalize_telegram_idempotency.py
          ruff check --fix src/database.py src/api.py src/telegram/envio.py tests/test_telegram_delivery_v2.py
          ruff format src/database.py src/api.py src/telegram/envio.py tests/test_telegram_delivery_v2.py
          python -m pytest -q tests/test_telegram_idempotency.py tests/test_telegram_delivery_v2.py tests/test_api.py tests/test_api_extra.py tests/test_telegram_pronosticos.py
      - name: Commit source and remove temporary machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch \
            scripts/finalize_telegram_idempotency.py \
            scripts/fix_finalize_telegram_v2.py \
            scripts/debug_telegram_v2.txt \
            .github/workflows/finalize-telegram-idempotency.yml \
            .github/workflows/diagnose-telegram-v2.yml \
            .github/workflows/apply-final-telegram-v2.yml \
            telegram-v2-diagnostic.txt
          git add src/database.py src/api.py src/telegram/envio.py tests/test_telegram_delivery_v2.py
          git status --short
          git commit -m "feat: completa idempotencia de webhook y cron Telegram"
          git push
