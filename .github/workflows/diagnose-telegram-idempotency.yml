name: Diagnose Telegram idempotency

on:
  push:
    branches: [feat/idempotent-telegram-delivery]
    paths: [scripts/debug_telegram_idempotency.txt]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-telegram-delivery
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Capture every stage
        shell: bash
        run: |
          set +e
          : > telegram-idempotency-diagnostic.txt
          python scripts/apply_telegram_idempotency.py >> telegram-idempotency-diagnostic.txt 2>&1
          echo "apply_exit=$?" >> telegram-idempotency-diagnostic.txt
          ruff check --fix src/database.py src/api.py src/telegram/envio.py tests/test_telegram_idempotency.py >> telegram-idempotency-diagnostic.txt 2>&1
          echo "ruff_exit=$?" >> telegram-idempotency-diagnostic.txt
          ruff format src/database.py src/api.py src/telegram/envio.py tests/test_telegram_idempotency.py >> telegram-idempotency-diagnostic.txt 2>&1
          echo "format_exit=$?" >> telegram-idempotency-diagnostic.txt
          python -m pytest -q tests/test_telegram_idempotency.py tests/test_api.py tests/test_api_extra.py >> telegram-idempotency-diagnostic.txt 2>&1
          echo "pytest_exit=$?" >> telegram-idempotency-diagnostic.txt
      - name: Commit diagnostic only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram-idempotency-diagnostic.txt
          git commit -m "chore: registra diagnóstico temporal de Telegram"
          git push
