name: Format E2E once

on:
  push:
    branches: [test/e2e-survivor-telegram-flow]
    paths: [.github/workflows/format-e2e.yml]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff format tests/test_e2e_survivor_telegram.py
      - name: Commit formatted test and remove helper
        run: |
          rm .github/workflows/format-e2e.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: aplica formato exacto a la prueba E2E"
          git push
