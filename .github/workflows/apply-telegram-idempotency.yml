name: Apply Telegram idempotency

on:
  push:
    branches: [feat/idempotent-telegram-delivery]
    paths: [scripts/fix_telegram_idempotency.py]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-telegram-delivery
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Apply and format
        run: |
          python scripts/fix_telegram_idempotency.py
          python scripts/apply_telegram_idempotency.py
          ruff check --fix src/database.py src/api.py src/telegram/envio.py tests/test_telegram_idempotency.py
          ruff format src/database.py src/api.py src/telegram/envio.py tests/test_telegram_idempotency.py
          python -m pytest -q tests/test_telegram_idempotency.py tests/test_api.py tests/test_api_extra.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/database.py src/api.py src/telegram/envio.py tests/test_telegram_idempotency.py
          git commit -m "feat: evita updates y entregas Telegram duplicados"
          git push
