name: Apply mypy fix and final gates

on:
  push:
    branches: [feat/idempotent-telegram-delivery]
    paths: [scripts/fix_mypy_cleanup.py]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-telegram-delivery
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Apply fix
        run: python scripts/fix_mypy_cleanup.py
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy
        run: mypy src/
      - name: Structure sanity
        run: python scripts/final_security_gate.py
      - name: Full tests and coverage
        run: python -m pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=64
      - name: Commit fix and remove temporary diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch \
            scripts/debug_mypy.txt \
            scripts/fix_mypy_cleanup.py \
            .github/workflows/diagnose-mypy.yml \
            .github/workflows/apply-mypy-cleanup.yml \
            mypy-diagnostic.txt
          git add src/database.py
          git commit -m "fix: tipa la comparación CAS de Telegram"
          git push
