name: Finalize Telegram idempotency

on:
  push:
    branches: [feat/idempotent-telegram-delivery]
    paths: [scripts/finalize_telegram_idempotency.py]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-telegram-delivery
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Apply and validate
        run: |
          python scripts/finalize_telegram_idempotency.py
          ruff check --fix src/database.py src/api.py src/telegram/envio.py tests/test_telegram_delivery_v2.py
          ruff format src/database.py src/api.py src/telegram/envio.py tests/test_telegram_delivery_v2.py
          python -m pytest -q tests/test_telegram_idempotency.py tests/test_telegram_delivery_v2.py tests/test_api.py tests/test_api_extra.py tests/test_telegram_pronosticos.py
      - name: Commit final source only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/finalize_telegram_idempotency.py .github/workflows/finalize-telegram-idempotency.yml
          git add src/database.py src/api.py src/telegram/envio.py tests/test_telegram_delivery_v2.py
          git commit -m "feat: completa idempotencia de webhook y cron Telegram"
          git push
