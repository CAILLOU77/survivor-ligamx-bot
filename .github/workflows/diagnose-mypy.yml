name: Diagnose mypy

on:
  push:
    branches: [feat/idempotent-telegram-delivery]
    paths: [scripts/debug_mypy.txt]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-telegram-delivery
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Capture mypy
        run: |
          set +e
          mypy src/ > mypy-diagnostic.txt 2>&1
          code=$?
          echo "exit=$code" >> mypy-diagnostic.txt
          cat mypy-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mypy-diagnostic.txt
          git commit -m "chore: registra diagnóstico temporal de mypy"
          git push
