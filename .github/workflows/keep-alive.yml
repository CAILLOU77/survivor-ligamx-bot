name: Keep Render Alive
# MANUAL (no automático): en plan gratis de Render, mantener el servicio despierto
# 24/7 gastaría el cupo mensual de horas. Por eso NO hay 'schedule': el servicio
# duerme y despierta solo cuando lo usas (/pick, alertas cada 6h). Este workflow
# queda como botón para "calentar" ambos servicios manualmente antes de un partido
# (Actions -> Keep Render Alive -> Run workflow), evitando el cold start.
on:
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Survivor bot
        run: curl -sf https://survivor-ligamx-bot.onrender.com/health || echo "⏳ Survivor bot despertando..."
      - name: Wake up Liga MX API (evita nulls por cold start en el dossier)
        run: curl -sf https://ligamx-api.onrender.com/health || echo "⏳ Liga MX API despertando..."
