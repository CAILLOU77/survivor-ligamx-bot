name: Keep Render Alive
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Survivor bot
        run: curl -sf https://survivor-ligamx-bot.onrender.com/health || echo "⏳ Survivor bot despertando..."
      - name: Wake up Liga MX API (evita nulls por cold start en el dossier)
        run: curl -sf https://ligamx-api.onrender.com/health || echo "⏳ Liga MX API despertando..."
