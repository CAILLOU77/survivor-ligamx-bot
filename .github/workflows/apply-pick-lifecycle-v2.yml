name: Apply pick lifecycle v2

on:
  push:
    branches: [feat/idempotent-pick-lifecycle-v2]
    paths: [scripts/fix_apply_pick_lifecycle_v2.py]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/idempotent-pick-lifecycle-v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - name: Apply, lint and format
        run: |
          python scripts/fix_apply_pick_lifecycle_v2.py
          python scripts/apply_pick_lifecycle_v2.py
          ruff check --fix src/database.py tests/test_pick_lifecycle_v2.py
          ruff format src/database.py tests/test_pick_lifecycle_v2.py
      - name: Commit generated source and tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/database.py tests/test_pick_lifecycle_v2.py
          git commit -m "feat: hace idempotente el ciclo de picks Survivor"
          git push
