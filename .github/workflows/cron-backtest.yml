name: Daily Backtest

on:
  schedule:
    - cron: '0 2 * * *'  # Cada día a las 2 AM UTC
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backtest
        run: |
          curl -X POST https://survivor-ligamx-bot.onrender.com/cron/backtest

      - name: Enviar resumen de rentabilidad por Telegram
        run: |
          curl -fsS -X POST https://survivor-ligamx-bot.onrender.com/alerts/resumen \
            -H "X-API-Key: ${{ secrets.API_KEY }}" \
            -H "Content-Type: application/json" || true
