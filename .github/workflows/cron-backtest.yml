name: Análisis Semanal Jornada

on:
  schedule:
    - cron: '0 10 * * 0'  # Cada domingo 10:00 UTC (tras jornada dominical)
  workflow_dispatch:

jobs:
  analisis:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar análisis de jornada
        run: |
          curl -X POST -H "X-API-Key: ${{ secrets.API_KEY }}" https://survivor-ligamx-bot.onrender.com/cron/analisis-semanal

      - name: Verificar envío (opcional)
        run: |
          sleep 5
          curl -sf https://survivor-ligamx-bot.onrender.com/health || echo "⏳ Bot despertando..."
